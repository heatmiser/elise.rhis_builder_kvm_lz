---
# sub | Disk Detection for Wipe Operations
# Detects Dell BOSS and Dell DC NVMe devices based on configuration flags.
# Results stored in __kvm_wipe_disk_targets list.

- name: "Sub | Initialize wipe targets list"
  ansible.builtin.set_fact:
    __kvm_wipe_disk_targets: []

# =====================================================================
# --- DELL BOSS DEVICE DETECTION ---
# =====================================================================

- name: "Sub | Detect Dell BOSS devices"
  ansible.builtin.shell: |
    set -o pipefail
    find /dev/disk/by-id -name "*Dell_BOSS*" 2>/dev/null | \
      grep -E -v 'part|scsi' | xargs readlink -f | sort
  register: __kvm_wipe_disk_boss_devices
  changed_when: false
  failed_when: false
  when: kvm_wipe_disk_boss_devices | bool

- name: "Sub | Add Dell BOSS devices to wipe targets"
  ansible.builtin.set_fact:
    __kvm_wipe_disk_targets: "{{ __kvm_wipe_disk_targets + __kvm_wipe_disk_boss_devices.stdout_lines }}"
  when:
    - kvm_wipe_disk_boss_devices | bool
    - __kvm_wipe_disk_boss_devices.rc == 0
    - __kvm_wipe_disk_boss_devices.stdout_lines | length > 0

# =====================================================================
# --- DELL DC NVME DEVICE DETECTION ---
# =====================================================================

- name: "Sub | Detect Dell DC NVMe SSD devices"
  ansible.builtin.shell: |
    set -o pipefail
    find /dev/disk/by-id -name "*Dell_DC_NVMe*" 2>/dev/null | \
      grep -E -v 'part|scsi' | grep -v '_1$' | xargs readlink -f | sort
  register: __kvm_wipe_disk_nvme_devices
  changed_when: false
  failed_when: false
  when: kvm_wipe_disk_nvme_devices | bool

- name: "Sub | Add Dell DC NVMe devices to wipe targets"
  ansible.builtin.set_fact:
    __kvm_wipe_disk_targets: "{{ __kvm_wipe_disk_targets + __kvm_wipe_disk_nvme_devices.stdout_lines }}"
  when:
    - kvm_wipe_disk_nvme_devices | bool
    - __kvm_wipe_disk_nvme_devices.rc == 0
    - __kvm_wipe_disk_nvme_devices.stdout_lines | length > 0

# =====================================================================
# --- VALIDATION AND DISPLAY ---
# =====================================================================

- name: "Sub | Validate at least one disk was detected"
  ansible.builtin.assert:
    that:
      - __kvm_wipe_disk_targets | length > 0
    fail_msg: "No disks detected for wiping. Check kvm_wipe_disk_boss_devices and kvm_wipe_disk_nvme_devices settings."
    success_msg: "Found {{ __kvm_wipe_disk_targets | length }} disk(s) for wiping"

- name: "Sub | Display wipe targets"
  ansible.builtin.debug:
    msg:
      - "==================================================="
      - "Disks that will be WIPED on {{ inventory_hostname }}"
      - "==================================================="
      - "Wipe method: {{ kvm_wipe_disk_method }}"
      - "Dell BOSS devices: {{ 'YES' if kvm_wipe_disk_boss_devices else 'NO' }}"
      - "Dell DC NVMe devices: {{ 'YES' if kvm_wipe_disk_nvme_devices else 'NO' }}"
      - "Total disks: {{ __kvm_wipe_disk_targets | length }}"
      - "Devices: {{ __kvm_wipe_disk_targets }}"
      - "==================================================="
...
