---
# =====================================================================
# RAID 10 Setup and Dual LVM Pool Creation
# =====================================================================

- name: Ensure mdadm and lvm2 are installed
  ansible.builtin.dnf:
    name:
      - mdadm
      - lvm2
    state: present

- name: Check if RAID array already exists
  ansible.builtin.command: mdadm --detail /dev/{{ kvm_setup_raid_name }}
  register: __kvm_setup_raid_check
  failed_when: false
  changed_when: false

- name: Stop existing RAID array if present
  ansible.builtin.command: mdadm --stop /dev/{{ kvm_setup_raid_name }}
  when:
    - __kvm_setup_raid_check.rc == 0
    - kvm_setup_raid_force_recreate | bool
  changed_when: true

- name: Zero superblock on RAID devices
  ansible.builtin.command: mdadm --zero-superblock {{ item }}
  loop: "{{ host.additional_disks }}"
  when:
    - __kvm_setup_raid_check.rc != 0 or kvm_setup_raid_force_recreate | bool
  failed_when: false
  changed_when: true

- name: Create RAID 10 array
  ansible.builtin.command: >-
    mdadm --create /dev/{{ kvm_setup_raid_name }}
    --level={{ kvm_setup_raid_level }}
    --raid-devices={{ host.additional_disks | length }}
    --chunk={{ kvm_setup_raid_chunk_size }}
    --metadata={{ kvm_setup_raid_metadata_version }}
    --assume-clean
    {% for disk in host.additional_disks %}{{ disk }}{% if not loop.last %} {% endif %}{% endfor %}
  when: __kvm_setup_raid_check.rc != 0
  register: __kvm_setup_raid_create
  changed_when: true

- name: Wait for RAID array to be available
  ansible.builtin.wait_for:
    path: /dev/{{ kvm_setup_raid_name }}
    state: present
    timeout: 60
  when: __kvm_setup_raid_create.changed

- name: Save RAID configuration to mdadm.conf
  ansible.builtin.shell: mdadm --detail --scan >> /etc/mdadm.conf
  when: __kvm_setup_raid_create.changed
  changed_when: true

- name: Update initramfs with RAID configuration
  ansible.builtin.command: dracut -f
  when: __kvm_setup_raid_create.changed
  changed_when: true

# =====================================================================
# --- Partition RAID Array for Separate Volume Groups ---
# =====================================================================
# Both filesystem and block storage pools are always created.
# Partition sizes calculated dynamically from percentages.

- name: Query RAID array size in bytes
  ansible.builtin.command: lsblk -b -n -o SIZE /dev/{{ kvm_setup_raid_name }}
  register: __kvm_setup_raid_size_bytes
  changed_when: false

- name: Calculate total RAID size in GiB
  ansible.builtin.set_fact:
    __kvm_setup_raid_total_gib: "{{ (__kvm_setup_raid_size_bytes.stdout | int / 1024 / 1024 / 1024) | round(2) }}"

- name: Validate percentage allocation does not exceed 100%
  ansible.builtin.assert:
    that:
      - (kvm_setup_raid_lvm_vg_filesystem_percent + kvm_setup_raid_lvm_vg_block_percent + kvm_setup_raid_lvm_overhead_percent) <= 100
    fail_msg: >-
      LVM allocation percentages exceed 100%:
      filesystem={{ kvm_setup_raid_lvm_vg_filesystem_percent }}%,
      block={{ kvm_setup_raid_lvm_vg_block_percent }}%,
      overhead={{ kvm_setup_raid_lvm_overhead_percent }}%,
      total={{ kvm_setup_raid_lvm_vg_filesystem_percent + kvm_setup_raid_lvm_vg_block_percent + kvm_setup_raid_lvm_overhead_percent }}%
    success_msg: >-
      LVM allocation validated:
      filesystem={{ kvm_setup_raid_lvm_vg_filesystem_percent }}%,
      block={{ kvm_setup_raid_lvm_vg_block_percent }}%,
      overhead={{ kvm_setup_raid_lvm_overhead_percent }}%

- name: Calculate partition sizes in GiB
  ansible.builtin.set_fact:
    __kvm_setup_raid_fs_partition_size_gib: >-
      {{ ((__kvm_setup_raid_total_gib | float * kvm_setup_raid_lvm_vg_filesystem_percent / 100) | round(2)) }}
    __kvm_setup_raid_block_partition_size_gib: >-
      {{ ((__kvm_setup_raid_total_gib | float * kvm_setup_raid_lvm_vg_block_percent / 100) | round(2)) }}

- name: Display calculated partition sizes
  ansible.builtin.debug:
    msg:
      - "RAID total size: {{ __kvm_setup_raid_total_gib }} GiB"
      - "Filesystem partition: {{ __kvm_setup_raid_fs_partition_size_gib }} GiB ({{ kvm_setup_raid_lvm_vg_filesystem_percent }}%)"
      - "Block partition: {{ __kvm_setup_raid_block_partition_size_gib }} GiB ({{ kvm_setup_raid_lvm_vg_block_percent }}%)"
      - >-
        Reserved overhead: {{ ((__kvm_setup_raid_total_gib | float * kvm_setup_raid_lvm_overhead_percent / 100) | round(2)) }}
        GiB ({{ kvm_setup_raid_lvm_overhead_percent }}%)
    verbosity: 1

- name: Check if RAID partitions exist
  ansible.builtin.command: parted -s /dev/{{ kvm_setup_raid_name }} print
  register: __kvm_setup_raid_partition_check
  failed_when: false
  changed_when: false

- name: Detect if partitions already exist on RAID array
  ansible.builtin.set_fact:
    __kvm_setup_raid_has_partitions: >-
      {{ __kvm_setup_raid_partition_check.rc == 0 and 'Number' in __kvm_setup_raid_partition_check.stdout }}

- name: Create GPT partition table on RAID array
  ansible.builtin.command: parted -s /dev/{{ kvm_setup_raid_name }} mklabel gpt
  when: not __kvm_setup_raid_has_partitions | bool
  changed_when: true

- name: Inform kernel of partition table changes on RAID array
  ansible.builtin.command: partprobe /dev/{{ kvm_setup_raid_name }}
  when: not __kvm_setup_raid_has_partitions | bool
  changed_when: false

- name: Create partition for filesystem volume group
  community.general.parted:
    device: /dev/{{ kvm_setup_raid_name }}
    number: 1
    label: gpt
    state: present
    part_start: 0%
    part_end: "{{ __kvm_setup_raid_fs_partition_size_gib }}GiB"
    flags:
      - lvm
  register: __kvm_setup_raid_fs_partition_created

- name: Create partition for block volume group
  community.general.parted:
    device: /dev/{{ kvm_setup_raid_name }}
    number: 2
    label: gpt
    state: present
    part_start: "{{ __kvm_setup_raid_fs_partition_size_gib }}GiB"
    part_end: >-
      {{ (__kvm_setup_raid_fs_partition_size_gib | float + __kvm_setup_raid_block_partition_size_gib | float) | round(2) }}GiB
    flags:
      - lvm
  register: __kvm_setup_raid_block_partition_created

- name: Wait for partition devices to be available
  ansible.builtin.wait_for:
    path: "/dev/{{ kvm_setup_raid_name }}p{{ item }}"
    state: present
    timeout: 30
  loop:
    - 1
    - 2

# =====================================================================
# --- Filesystem Storage Pool (for volume_mode: filesystem) ---
# =====================================================================

- name: Check if filesystem PV exists
  ansible.builtin.command: pvdisplay /dev/{{ kvm_setup_raid_name }}p1
  register: __kvm_setup_raid_fs_pv_check
  failed_when: false
  changed_when: false

- name: Create LVM physical volume for filesystem storage
  ansible.builtin.command: pvcreate /dev/{{ kvm_setup_raid_name }}p1
  when: __kvm_setup_raid_fs_pv_check.rc != 0
  changed_when: true

- name: Create volume group for filesystem storage
  community.general.lvg:
    vg: "{{ kvm_setup_raid_lvm_vg_filesystem_name }}"
    pvs: /dev/{{ kvm_setup_raid_name }}p1
    state: present

- name: Create logical volume for filesystem pool with snapshot reserve
  community.general.lvol:
    vg: "{{ kvm_setup_raid_lvm_vg_filesystem_name }}"
    lv: lv_filesystem_pool
    size: "{{ 100 - kvm_setup_raid_lvm_snapshot_reserve_percent }}%VG"
  register: __kvm_setup_raid_lv_filesystem_created

- name: Format filesystem logical volume with XFS
  community.general.filesystem:
    fstype: xfs
    dev: /dev/{{ kvm_setup_raid_lvm_vg_filesystem_name }}/lv_filesystem_pool
    opts: "-L fs_pool"

- name: Create mount point for filesystem pool
  ansible.builtin.file:
    path: "{{ kvm_setup_libvirt_pool_filesystem_path }}"
    state: directory
    mode: "0711"
    owner: root
    group: root

- name: Mount filesystem pool
  ansible.posix.mount:
    path: "{{ kvm_setup_libvirt_pool_filesystem_path }}"
    src: /dev/{{ kvm_setup_raid_lvm_vg_filesystem_name }}/lv_filesystem_pool
    fstype: xfs
    opts: defaults,noatime
    state: mounted

- name: Set SELinux context for filesystem storage pool
  community.general.sefcontext:
    target: "{{ kvm_setup_libvirt_pool_filesystem_path }}(/.*)?"
    setype: virt_image_t
    state: present

- name: Apply SELinux context to filesystem pool
  ansible.builtin.command: restorecon -Rv {{ kvm_setup_libvirt_pool_filesystem_path }}
  changed_when: true

- name: Check if filesystem storage pool exists
  ansible.builtin.command: virsh pool-info {{ kvm_setup_libvirt_pool_filesystem_name }}
  register: __kvm_setup_raid_pool_fs_check
  failed_when: false
  changed_when: false

- name: Define libvirt filesystem storage pool
  community.libvirt.virt_pool:
    command: define
    name: "{{ kvm_setup_libvirt_pool_filesystem_name }}"
    xml: |
      <pool type='{{ kvm_setup_libvirt_pool_filesystem_type }}'>
        <name>{{ kvm_setup_libvirt_pool_filesystem_name }}</name>
        <target>
          <path>{{ kvm_setup_libvirt_pool_filesystem_path }}</path>
          <permissions>
            <mode>0711</mode>
            <owner>0</owner>
            <group>0</group>
          </permissions>
        </target>
      </pool>
  when: __kvm_setup_raid_pool_fs_check.rc != 0

- name: Start filesystem storage pool
  community.libvirt.virt_pool:
    name: "{{ kvm_setup_libvirt_pool_filesystem_name }}"
    state: active

- name: Enable autostart for filesystem storage pool
  ansible.builtin.command: virsh pool-autostart {{ kvm_setup_libvirt_pool_filesystem_name }}
  register: __kvm_setup_raid_pool_fs_autostart
  changed_when: >-
    'marked as autostarted' in __kvm_setup_raid_pool_fs_autostart.stdout
    or 'autostart' in __kvm_setup_raid_pool_fs_autostart.stdout
  failed_when: >-
    __kvm_setup_raid_pool_fs_autostart.rc != 0
    and 'already' not in __kvm_setup_raid_pool_fs_autostart.stderr

# =====================================================================
# --- Block Storage Pool (for volume_mode: block) ---
# =====================================================================

- name: Check if block PV exists
  ansible.builtin.command: pvdisplay /dev/{{ kvm_setup_raid_name }}p2
  register: __kvm_setup_raid_block_pv_check
  failed_when: false
  changed_when: false

- name: Create LVM physical volume for block storage
  ansible.builtin.command: pvcreate /dev/{{ kvm_setup_raid_name }}p2
  when: __kvm_setup_raid_block_pv_check.rc != 0
  changed_when: true

- name: Create volume group for block storage
  community.general.lvg:
    vg: "{{ kvm_setup_raid_lvm_vg_block_name }}"
    pvs: /dev/{{ kvm_setup_raid_name }}p2
    state: present

- name: Check if block storage pool exists
  ansible.builtin.command: virsh pool-info {{ kvm_setup_libvirt_pool_block_name }}
  register: __kvm_setup_raid_pool_block_check
  failed_when: false
  changed_when: false

- name: Define libvirt block storage pool
  community.libvirt.virt_pool:
    command: define
    name: "{{ kvm_setup_libvirt_pool_block_name }}"
    xml: |
      <pool type='{{ kvm_setup_libvirt_pool_block_type }}'>
        <name>{{ kvm_setup_libvirt_pool_block_name }}</name>
        <source>
          <name>{{ kvm_setup_raid_lvm_vg_block_name }}</name>
          <format type='lvm2'/>
        </source>
        <target>
          <path>/dev/{{ kvm_setup_raid_lvm_vg_block_name }}</path>
        </target>
      </pool>
  when: __kvm_setup_raid_pool_block_check.rc != 0

- name: Start block storage pool
  community.libvirt.virt_pool:
    name: "{{ kvm_setup_libvirt_pool_block_name }}"
    state: active

- name: Enable autostart for block storage pool
  ansible.builtin.command: virsh pool-autostart {{ kvm_setup_libvirt_pool_block_name }}
  register: __kvm_setup_raid_pool_block_autostart
  changed_when: >-
    'marked as autostarted' in __kvm_setup_raid_pool_block_autostart.stdout
    or 'autostart' in __kvm_setup_raid_pool_block_autostart.stdout
  failed_when: >-
    __kvm_setup_raid_pool_block_autostart.rc != 0
    and 'already' not in __kvm_setup_raid_pool_block_autostart.stderr

- name: Enable and start mdmonitor service
  ansible.builtin.systemd:
    name: mdmonitor
    enabled: true
    state: started
...
