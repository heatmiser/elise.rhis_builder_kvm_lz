---
# =====================================================================
# VM State Check and Destruction
# =====================================================================

- name: "Check if VM exists: {{ vm.vmname }}"
  community.libvirt.virt:
    command: info
  register: __kvm_remove_vm_info
  failed_when: false
  become: true

- name: "Destroy running VM: {{ vm.vmname }}"
  community.libvirt.virt:
    name: "{{ vm.vmname }}"
    state: destroyed
  when: __kvm_remove_vm_info is succeeded and vm.vmname in __kvm_remove_vm_info
  failed_when: false
  become: true

- name: "Undefine VM from libvirt: {{ vm.vmname }}"
  community.libvirt.virt:
    name: "{{ vm.vmname }}"
    command: undefine
  when: __kvm_remove_vm_info is succeeded and vm.vmname in __kvm_remove_vm_info
  failed_when: false
  become: true

# =====================================================================
# --- Storage Volume Removal ---
# =====================================================================

- name: "Remove filesystem-mode disk images: {{ vm.vmname }}"
  ansible.builtin.file:
    path: "{{ kvm_setup_libvirt_pool_filesystem_path }}/{{ item.name }}.img"
    state: absent
  loop: "{{ vm.disks | selectattr('disk.volume_mode', 'equalto', 'filesystem') | list }}"
  become: true

- name: "Remove block-mode logical volumes: {{ vm.vmname }}"
  community.general.lvol:
    vg: "{{ kvm_setup_raid_lvm_vg_block_name }}"
    lv: "{{ item.name }}"
    state: absent
    force: true
  loop: "{{ vm.disks | selectattr('disk.volume_mode', 'equalto', 'block') | list }}"
  failed_when: false
  become: true

# =====================================================================
# --- Kickstart Artifacts Cleanup ---
# =====================================================================

- name: "Remove VM kickstart configuration: {{ vm.vmname }}"
  ansible.builtin.file:
    path: "{{ kvm_setup_libvirt_pool_filesystem_path }}/kickstart/{{ vm.vmname }}-ks.cfg"
    state: absent
  become: true

- name: "Remove VM kickstart USB image: {{ vm.vmname }}"
  ansible.builtin.file:
    path: "{{ kvm_setup_libvirt_pool_filesystem_path }}/kickstart/{{ vm.vmname }}-ks.img"
    state: absent
  become: true

# =====================================================================
# --- Temporary Files Cleanup ---
# =====================================================================

- name: "Remove temporary XML definition file: {{ vm.vmname }}"
  ansible.builtin.file:
    path: "/tmp/{{ vm.vmname }}.xml"
    state: absent
  delegate_to: localhost
...
