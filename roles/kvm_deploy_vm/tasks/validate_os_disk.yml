---
# sub | OS Disk Capacity Validation
# Called from main.yml before volume creation

- name: "Sub | Find OS disks for VM: {{ vm.vmname }}"
  ansible.builtin.set_fact:
    __kvm_deploy_vm_os_disks: "{{ vm.disks | selectattr('name', 'search', '_os') | list }}"

- name: "Sub | Calculate total filesystem requirements for VM: {{ vm.vmname }}"
  ansible.builtin.set_fact:
    __kvm_deploy_vm_total_fs_mb: >-
      {{
        vm.fs.boot_mb | int +
        vm.fs.boot_efi_mb | int +
        vm.fs.lv_root_mb | int +
        vm.fs.lv_home_mb | int +
        vm.fs.lv_tmp_mb | int +
        vm.fs.lv_var_tmp_mb | int +
        vm.fs.lv_var_log_mb | int +
        vm.fs.lv_var_log_audit_mb | int +
        (0 if vm.fs.lv_var_mb | int == 1 else vm.fs.lv_var_mb | int)
      }}
  when: __kvm_deploy_vm_os_disks | length > 0

- name: "Sub | Calculate required disk capacity with LVM overhead for VM: {{ vm.vmname }}"
  ansible.builtin.set_fact:
    __kvm_deploy_vm_required_gb: "{{ ((__kvm_deploy_vm_total_fs_mb | float * 1.05) / 1024) | round(2) }}"
  when: __kvm_deploy_vm_os_disks | length > 0

- name: "Sub | Validate each OS disk capacity for VM: {{ vm.vmname }}"
  ansible.builtin.assert:
    that:
      - item.disk.capacity | int >= __kvm_deploy_vm_required_gb | float
    fail_msg: |
      VALIDATION FAILED for {{ vm.vmname }}

      OS Disk: {{ item.name }}
      Configured Capacity: {{ item.disk.capacity }}GB

      Filesystem Layout Requirements:
        /boot:              {{ vm.fs.boot_mb }}MB
        /boot/efi:          {{ vm.fs.boot_efi_mb }}MB
        / (root):           {{ vm.fs.lv_root_mb }}MB
        /home:              {{ vm.fs.lv_home_mb }}MB
        /tmp:               {{ vm.fs.lv_tmp_mb }}MB
        /var/tmp:           {{ vm.fs.lv_var_tmp_mb }}MB
        /var/log:           {{ vm.fs.lv_var_log_mb }}MB
        /var/log/audit:     {{ vm.fs.lv_var_log_audit_mb }}MB
        /var:               {{ 'remaining space' if vm.fs.lv_var_mb | int == 1 else vm.fs.lv_var_mb ~ 'MB' }}
        ----------------------------------------
        Total:              {{ __kvm_deploy_vm_total_fs_mb }}MB
        LVM Overhead (5%):  {{ (__kvm_deploy_vm_total_fs_mb | float * 0.05) | round(0) | int }}MB
        ========================================
        Required Capacity:  {{ __kvm_deploy_vm_required_gb }}GB

      ACTION REQUIRED:
      - Increase disk capacity to at least {{ __kvm_deploy_vm_required_gb }}GB in vars/vm_vars.yml
      OR
      - Reduce filesystem sizes to fit within {{ item.disk.capacity }}GB
    success_msg: "OS disk {{ item.name }} capacity validated: {{ item.disk.capacity }}GB >= {{ __kvm_deploy_vm_required_gb }}GB required"
  loop: "{{ __kvm_deploy_vm_os_disks }}"
  when: __kvm_deploy_vm_os_disks | length > 0
...
